version: '3.9'

services:
  app:
    build: .
    container_name: registration-system-api
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-dbpassword}
      MONGO_DATABASE: ${MONGO_DATABASE:-registrationsystemdb}
    depends_on:
      - mongodb
    networks:
      - registration-system-network

  mongodb:
    container_name: registration-system-database
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dbpassword}
    volumes:
      - mongodb_data:/data/db
    networks:
      - registration-system-network

volumes:
  mongodb_data:
    driver: local

networks:
  registration-system-network:
    name: registration-system-network
    driver: bridge