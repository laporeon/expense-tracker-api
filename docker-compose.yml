services:
  app:
    build: .
    container_name: expense-tracker-api
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-dev}"
      PORT: "${PORT:-8080}"
      PG_USERNAME: "${PG_USERNAME:-admin}"
      PG_PASSWORD: "${PG_PASSWORD:-dbpassword}"
      POSTGRES_DB: "${POSTGRES_DB:-expenses_db}"
      POSTGRES_HOST: postgresql
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-here}
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - expense-tracker-network

  postgresql:
    container_name: expense-tracker-database
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: "${PG_USERNAME:-admin}"
      POSTGRES_PASSWORD: "${PG_PASSWORD:-dbpassword}"
      POSTGRES_DB: "${POSTGRES_DB:-expenses_db}"
    volumes:
      - expensetracker_postgres_data:/var/lib/postgresql
    networks:
      - expense-tracker-network
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${PG_USERNAME} -d ${POSTGRES_DB}'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  expensetracker_postgres_data:
    driver: local

networks:
  expense-tracker-network:
    name: expense-tracker-network
    driver: bridge
