# ====== SERVER ======
server:
  port: ${PORT:-8080}

# ====== GENERAL ======
spring:
  application:
    name: expense-tracker-api

  # ====== DATABASE ======
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:expenses_db}
    username: ${PG_USERNAME}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ====== JPA/HIBERNATE ======
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ====== FLYWAY ======
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# ====== LOGGING ======
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
    com:
      laporeon: DEBUG

# ===== JWT Security configuration =====
jwt:
  secret: ${JWT_SECRET}

# ====== SWAGGER ======
springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs